server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Runtime config: nunca cachear, cambia por entorno (K8s Secret/ConfigMap).
    location = /env.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Long-lived cache for fingerprinted assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback — every unknown route serves index.html so
    # vue-router (createWebHistory) can resolve it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
